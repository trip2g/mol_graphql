# Static demo on GitHub Pages: GraphQL runs IN THE BROWSER (pages/mock.mjs),
# no server needed. Builds the mam bundle + the in-browser mock, publishes
# pages/dist/ to the project Pages site (…github.io/mol_graphql/).
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      # pre-fetch the $mol module namespaces (same as Dockerfile.app; the mam
      # builder would otherwise clone them on first build — see .meta.tree)
      - name: Fetch $mol module namespaces
        run: |
          git clone --depth 1 https://github.com/hyoo-ru/mam_mol.git mol
          git clone --depth 1 https://github.com/hyoo-ru/mam_node.git node

      - run: npm run codegen

      - run: npm run build
        env:
          MAM_PULL_DISABLED: '1'

      - run: npm run build:pages

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
