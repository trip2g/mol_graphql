# FALLBACK deploy (manual): the pre-canonical path — mam build of demo/app
# plus the esbuild-bundled in-browser GraphQL executor (pages/build.mjs,
# graphql-js graphqlSync over the real SDL). The canonical deploy is
# .github/workflows/deploy.yml (hyoo-ru/mam_build + the $demo_app_static
# module). Keep this until the canonical path is proven live, then delete it
# together with pages/.
name: Deploy demo to GitHub Pages (fallback, esbuild mock)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # this repo is a mam PACKAGE now (no vendored bootstrap): assemble a
      # workspace out of tree, mount the checkout as its demo/ package
      - name: Set up mam workspace
        run: |
          git clone --depth 1 https://github.com/hyoo-ru/mam.git "$RUNNER_TEMP/mam"
          git clone --depth 1 https://github.com/hyoo-ru/mam_mol.git "$RUNNER_TEMP/mam/mol"
          git clone --depth 1 https://github.com/hyoo-ru/mam_node.git "$RUNNER_TEMP/mam/node"
          ln -s "$GITHUB_WORKSPACE" "$RUNNER_TEMP/mam/demo"
          cd "$RUNNER_TEMP/mam" && npm install

      - run: npm ci

      - run: npm run codegen

      - name: Build demo/app
        run: cd "$RUNNER_TEMP/mam" && npx mam demo/app
        env:
          MAM_PULL_DISABLED: '1'

      - run: npm run build:pages

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
